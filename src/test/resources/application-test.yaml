spring:
  flyway:
    enabled: true
    clean-disabled: false
  rabbitmq:
    listener:
      simple:
        auto-startup: false

app:
  security:
    jwt:
      secret-key: RGF5TGFNb3RDaHVvaUJpTWF0RGFuaENob01vaVRydW9uZ1Rlc3REdURhaTI1NkJpdA==
      access-token-exp-sec: 3600
    refresh-token:
      exp-days: 7
  thread-pool:
    async:
      core-size: 2
      max-size: 5
      queue-capacity: 10
      await-termination-seconds: 60
    scheduler:
      pool-size: 2
      await-termination-seconds: 60
  superuser:
    email:
    username:
    password:
    full-name:
  cloudinary:
    cloud-name: dummy_cloud
    api-key: dummy_key
    api-secret: dummy_secret
  websocket:
    broker-relay:
      enabled: false

users:
  scheduler:
    clean-refresh-token:
      cron: "0 0 0 * * ?"

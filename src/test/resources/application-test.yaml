spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/graduation_test_db
    username: ${TEST_DB_USER:${POSTGRES_USER:postgres}}
    password: ${TEST_DB_PASS:${POSTGRES_PASSWORD:123456}}
  flyway:
    enabled: true
    clean-disabled: false

app:
  security:
    jwt:
      secret-key: RGF5TGFNb3RDaHVvaUJpTWF0RGFuaENob01vaVRydW9uZ1Rlc3REdURhaTI1NkJpdA==
      access-token-exp-sec: 3600
    refresh-token:
      exp-days: 7
  thread-pool:
    async:
      core-size: 2
      max-size: 5
      queue-capacity: 10
      await-termination-seconds: 60
    scheduler:
      pool-size: 2
      await-termination-seconds: 60
  superuser:
    email:
    username:
    password:
    full-name:
  cloudinary:
    cloud-name: dummy_cloud
    api-key: dummy_key
    api-secret: dummy_secret

users:
  scheduler:
    clean-refresh-token:
      cron: "0 0 0 * * ?"
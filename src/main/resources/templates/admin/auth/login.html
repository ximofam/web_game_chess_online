<!-- templates/admin/auth/login.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/admin-login.css}">
</head>

<body>

    <div class="login-wrapper">
        <div class="login-card">

            <!-- Logo -->
            <div class="text-center mb-4">
                <i class="bi bi-hexagon-fill text-primary" style="font-size: 40px"></i>
                <h5 class="mt-2 fw-semibold">Admin Panel</h5>
                <p class="text-muted small">Đăng nhập để tiếp tục</p>
            </div>

            <!-- Alert lỗi do JS điều khiển -->
            <div id="login-error" class="alert alert-danger d-flex align-items-center gap-2 py-2 mb-3"
                style="display:none !important">
                <i class="bi bi-exclamation-circle-fill"></i>
                <span>Tên đăng nhập hoặc mật khẩu không đúng</span>
            </div>

            <!-- Alert logout -->
            <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center gap-2 py-2">
                <i class="bi bi-check-circle-fill"></i>
                <span>Đăng xuất thành công</span>
            </div>

            <!-- Form -->
            <form id="login-form" th:action="@{/login}" method="post">

                <div class="mb-3">
                    <label class="form-label fw-medium">Tên đăng nhập hoặc Email</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white">
                            <i class="bi bi-person text-muted"></i>
                        </span>
                        <input type="text" id="username" name="username" class="form-control border-start-0" autofocus
                            required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-medium">Mật khẩu</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white">
                            <i class="bi bi-lock text-muted"></i>
                        </span>
                        <input type="password" id="password" name="password"
                            class="form-control border-start-0 border-end-0" placeholder="password" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Đăng nhập
                </button>
            </form>

        </div>
    </div>


    <script th:src="@{/js/auth.js}"></script>
    <script>
        // Hiển thị lỗi nếu Spring redirect về ?error=true (fallback)
        if (new URLSearchParams(location.search).get('error')) {
            document.getElementById('login-error').style.display = 'flex';
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const errorDiv = document.getElementById('login-error');
            errorDiv.style.display = 'none';

            const formData = new FormData(e.target);
            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams(formData)
            });

            if (!res.ok) {
                errorDiv.style.display = 'flex';
                return;
            }

            const data = await res.json(); // { accessToken, refreshToken }
            Auth.setTokens(data);
            window.location.href = '/admin/';
        });
    </script>
</body>

</html>

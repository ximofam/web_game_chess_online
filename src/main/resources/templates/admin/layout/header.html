<!-- templates/fragments/header.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
    <header th:fragment="header" id="header" class="d-flex align-items-center px-4">
        <div class="d-flex align-items-center flex-grow-1">
            <span class="text-muted fs-6" th:text="${title} ?: 'Dashboard'"></span>
        </div>

        <div class="d-flex align-items-center gap-3">
            <a th:href="@{/swagger-ui/index.html}" target="_blank" class="btn btn-light btn-sm">
                <i class="bi bi-braces"></i>
                <span class="d-none d-md-inline ms-1">API Docs</span>
            </a>

            <!-- Thêm id="bell-btn" và id="notif-badge" -->
            <button id="bell-btn" class="btn btn-light btn-sm position-relative">
                <i class="bi bi-bell"></i>
                <span id="notif-badge"
                    class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                    style="font-size:10px; display:none">0</span>
            </button>

            <!-- Thêm sau button#bell-btn -->
            <div id="notif-modal"
                style="display:none; position:absolute; top:56px; right:16px; z-index:1050; width:380px;">
                <div class="notif-panel shadow">

                    <div class="notif-panel-header">
                        <span class="fw-medium">Thông báo</span>
                        <div class="d-flex align-items-center gap-1">
                            <button class="btn btn-link btn-sm text-muted p-1" id="notif-mark-all">Đánh dấu đã
                                đọc</button>
                            <button class="btn btn-light btn-sm" id="notif-delete-all" title="Xóa tất cả">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </div>

                    <div class="notif-tabs">
                        <button class="notif-tab active" data-tab="all">Tất cả</button>
                        <button class="notif-tab" data-tab="unread">Chưa đọc <span
                                id="notif-unread-tab"></span></button>
                    </div>

                    <div id="notif-list" class="notif-list"></div>

                    <div class="notif-panel-footer">
                        <button class="btn btn-link btn-sm text-muted w-100" id="notif-load-more">
                            <i class="bi bi-three-dots"></i> Tải thêm
                        </button>
                    </div>
                </div>
            </div>

            <div class="dropdown">
                <button class="btn btn-light btn-sm dropdown-toggle d-flex align-items-center gap-2"
                    data-bs-toggle="dropdown">
                    <img th:src="${currentUser.avatarUrl} ?: 'https://ui-avatars.com/api/?name=' + ${currentUser.username} + '&background=random'"
                        class="avatar-circle" alt="avatar">
                    <span class="d-none d-md-inline" th:text="${currentUser.username}"></span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end shadow-sm">
                    <li>
                        <div class="px-3 py-2">
                            <div class="text-muted small" th:text="${currentUser.username}"></div>
                        </div>
                    </li>
                    <li>
                        <hr class="dropdown-divider">
                    </li>
                    <li>
                        <a class="dropdown-item" th:href="@{/admin/profile/my}">
                            <i class="bi bi-person me-2"></i> Tài khoản
                        </a>
                    </li>
                    <li>
                        <form th:action="@{/logout}" method="post">
                            <button type="submit" class="dropdown-item text-danger" onclick="Auth.clearTokens()">
                                <i class="bi bi-box-arrow-right me-2"></i> Đăng xuất
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </header>
</body>

</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{admin/layout/base :: layout(~{::content}, ~{::scripts})}">

<head>
    <title>Thông tin cá nhân</title>
</head>

<body>

    <th:block th:fragment="content">
        <div class="container-fluid px-4">
            <h5 class="mb-4 fw-bold text-secondary">Hồ sơ cá nhân</h5>

            <div th:if="${successMessage}"
                class="alert alert-success alert-dismissible fade show shadow-sm border-0 mb-4" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm border-0 mb-4"
                role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div class="row">
                <div class="col-xl-4 col-lg-5 mb-4">
                    <div class="card shadow-sm border-0 text-center py-4">
                        <div class="card-body">
                            <div class="mb-3 position-relative d-inline-block">
                                <img th:src="${user.avatarUrl} ?: 'https://ui-avatars.com/api/?name=' + ${user.fullName} + '&background=random'"
                                    alt="User Avatar" class="rounded-circle img-thumbnail shadow-sm"
                                    style="width: 140px; height: 140px; object-fit: cover;">
                                <label for="avatarInput"
                                    class="position-absolute bottom-0 end-0 bg-primary rounded-circle d-flex align-items-center justify-content-center shadow"
                                    style="width: 34px; height: 34px; cursor: pointer; margin: 4px">
                                    <i class="bi bi-camera-fill text-white" style="font-size: 14px"></i>
                                </label>
                            </div>

                            <div id="avatarFormWrapper" class="d-none mt-3">
                                <form th:action="@{/admin/profile/avatar}" method="post" enctype="multipart/form-data">
                                    <div class="d-flex align-items-center gap-2">
                                        <input type="file" id="avatarInput" name="file" accept="image/*"
                                            class="form-control form-control-sm" style="max-width: 260px"
                                            onchange="previewAvatar(this)">
                                        <button type="submit" class="btn btn-primary btn-sm">
                                            <i class="bi bi-upload me-1"></i> Lưu
                                        </button>
                                        <button type="button" class="btn btn-light btn-sm" onclick="cancelAvatar()">
                                            Hủy
                                        </button>
                                    </div>
                                </form>
                            </div>

                            <h5 class="card-title mb-1 fw-bold text-dark" th:text="${user.fullName}">Nguyễn Văn A
                            </h5>
                            <p class="text-muted small mb-3" th:text="'@' + ${user.username}">@username</p>
                            <hr class="my-4 mx-3 opacity-25">
                            <div class="text-start px-3">
                                <div class="d-flex justify-content-between small mb-2">
                                    <span class="text-muted">Mã số thành viên:</span>
                                    <span class="fw-bold text-secondary" th:text="'#' + ${user.id}">#1</span>
                                </div>
                                <div class="d-flex justify-content-between small">
                                    <span class="text-muted">Quyền hạn:</span>
                                    <span class="badge bg-success-subtle text-success border border-success-subtle"
                                        th:text="${user.role}">Quản
                                        trị viên</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-xl-8 col-lg-7">
                    <div class="card shadow-sm border-0 mb-4">
                        <div class="card-header bg-transparent border-0 pt-4 px-4">
                            <h6 class="m-0 fw-bold text-primary"><i class="bi bi-person-lines-fill me-2"></i>Cập nhật
                                thông tin tài khoản</h6>
                        </div>
                        <div class="card-body px-4 pb-4">
                            <form th:action="@{/admin/profile/update}" method="post">

                                <th:block th:if="${_csrf != null}">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                </th:block>

                                <div class="row g-3 mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label small text-muted fw-semibold">Họ và tên</label>
                                        <div class="input-group">
                                            <span class="input-group-text border-end-0 text-muted bg-white"><i
                                                    class="bi bi-person"></i></span>
                                            <input type="text" name="fullName" class="form-control border-start-0"
                                                th:value="${user.fullName}" required>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label small text-muted fw-semibold">Tên tài khoản
                                            (Username)</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light border-end-0 text-muted"><i
                                                    class="bi bi-at"></i></span>
                                            <input type="text" class="form-control bg-light border-start-0"
                                                th:value="${user.username}" readonly>
                                        </div>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label small text-muted fw-semibold">Địa chỉ Email</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0 text-muted"><i
                                                class="bi bi-envelope"></i></span>
                                        <input type="email" class="form-control bg-light border-start-0"
                                            th:value="${user.email}" readonly>
                                    </div>
                                </div>

                                <div class="row g-3 mb-4">
                                    <div class="col-md-6">
                                        <label class="form-label small text-muted fw-semibold">Giới tính</label>
                                        <div class="input-group">
                                            <span class="input-group-text border-end-0 text-muted bg-white"><i
                                                    class="bi bi-gender-ambiguous"></i></span>
                                            <select name="gender" class="form-select border-start-0">
                                                <option value="" th:selected="${user.gender == null}">Chọn giới
                                                    tính</option>
                                                <option value="MALE" th:selected="${user.gender == 'MALE'}">Nam
                                                </option>
                                                <option value="FEMALE" th:selected="${user.gender == 'FEMALE'}">
                                                    Nữ
                                                </option>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label small text-muted fw-semibold">Ngày sinh</label>
                                        <div class="input-group">
                                            <span class="input-group-text border-end-0 text-muted bg-white"><i
                                                    class="bi bi-calendar3"></i></span>
                                            <input type="date" name="dateOfBirth" class="form-control border-start-0"
                                                th:value="${user.dateOfBirth}">
                                        </div>
                                    </div>
                                </div>

                                <div class="d-flex justify-content-end gap-2 border-top pt-3">
                                    <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary px-4"><i
                                            class="bi bi-arrow-left me-1"></i> Hủy bỏ</a>
                                    <button type="submit" class="btn btn-primary px-4"><i class="bi bi-save me-1"></i>
                                        Lưu thay đổi</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </th:block>

    <th:block th:fragment="scripts">
        <script>
            document.querySelector('label[for="avatarInput"]').addEventListener('click', () => {
                document.getElementById('avatarFormWrapper').classList.remove('d-none');
            });

            function previewAvatar(input) {
                if (!input.files || !input.files[0]) return;
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('avatarPreview').src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }

            function cancelAvatar() {
                document.getElementById('avatarFormWrapper').classList.add('d-none');
                document.getElementById('avatarInput').value = '';
                document.getElementById('avatarPreview').src =
                    document.getElementById('avatarPreview').dataset.original;
            }
        </script>
    </th:block>

</body>

</html>

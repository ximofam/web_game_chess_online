spring:
  application:
    name: graduation-project
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        generate_statistics: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public
    validate-on-migrate: true
    out-of-order: false


decorator:
  datasource:
    p6spy:
      enable-logging: true
      logging: slf4j
      log-format: "\n%(executionTime) ms | (sql): %(sql)"

logging:
  level:
    p6spy: DEBUG

app:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      access-token-exp-sec: ${ACCESS_TOKEN_EXP_SEC}
    refresh-token:
      exp-days: ${REFRESH_TOKEN_EXP_DAYS}

  thread-pool:
    async:
      core-size: ${ASYNC_CORE_SIZE}
      max-size: ${ASYNC_MAX_SIZE}
      queue-capacity: ${ASYNC_QUEUE_CAPACITY}
      await-termination-seconds: ${ASYNC_AWAIT_TERMINATION}
    scheduler:
      pool-size: ${SCHEDULER_POOL_SIZE}
      await-termination-seconds: ${SCHEDULER_AWAIT_TERMINATION}

users:
  scheduler:
    clean-refresh-token:
      batch-size: 1000
      cron: ${CLEAN_REFRESH_TOKEN_CRON}
spring:
  application:
    name: graduation-project
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        generate_statistics: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public
    validate-on-migrate: true
    out-of-order: false


decorator:
  datasource:
    p6spy:
      enable-logging: true
      logging: slf4j
      log-format: "\n------------------------------------------------------------\nTime    : %(executionTime) ms\nQuery   : %(sql)\n------------------------------------------------------------"

logging:
  level:
    p6spy: DEBUG

app:
  security:
    jwt:
      secret-key: "AVien72 aka Ximofam aka VIENTHUHAI dep trai nhat VT"
      access-token-exp-sec: 900
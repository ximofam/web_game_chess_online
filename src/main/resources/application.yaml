spring:
  application:
    name: graduation-project
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        generate_statistics: true
  #  flyway:
  #    enabled: true
  #    baseline-on-migrate: true
  #    locations: classpath:db/migration
  #    schemas: public
  #    validate-on-migrate: true
  #    out-of-order: false
  flyway:
    enabled: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 60000ms
      lettuce:
        pool:
          enabled: true
          max-active: 20
          max-idle: 10
          min-idle: 2
          max-wait: 2s

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}

  ai:
    openai:
      api-key: ${GROQ_API_KEY}
      base-url: https://api.groq.com/openai/v1
      chat:
        model: ${GROQ_MODEL}


decorator:
  datasource:
    p6spy:
      enable-logging: true
      logging: slf4j
      log-format: "\n%(executionTime) ms | (sql): %(sql)"

logging:
  level:
    p6spy: DEBUG

app:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      access-token-exp-sec: ${ACCESS_TOKEN_EXP_SEC}
    refresh-token:
      exp-days: ${REFRESH_TOKEN_EXP_DAYS}

  thread-pool:
    async:
      core-size: ${ASYNC_CORE_SIZE}
      max-size: ${ASYNC_MAX_SIZE}
      queue-capacity: ${ASYNC_QUEUE_CAPACITY}
      await-termination-seconds: ${ASYNC_AWAIT_TERMINATION}
    scheduler:
      pool-size: ${SCHEDULER_POOL_SIZE}
      await-termination-seconds: ${SCHEDULER_AWAIT_TERMINATION}

  superuser:
    email: ${SUPERUSER_EMAIL}
    username: ${SUPERUSER_USERNAME}
    password: ${SUPERUSER_PASSWORD}

  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}

  websocket:
    rabbitmq-stomp-host: ${RABBITMQ_STOMP_HOST:localhost}
    rabbitmq-stomp-port: ${RABBITMQ_STOMP_PORT:61613}
    rabbitmq-stomp-login: ${RABBITMQ_STOMP_LOGIN:guest}
    rabbitmq-stomp-passcode: ${RABBITMQ_STOMP_PASSCODE:guest}

  rabbitmq:
    exchange:
      main: app.exchange
      dlx: app.dlx
    queues:
      post:
        name: post.queue
        dlq: post.dead.queue
        routing-key: post.#
        dlq-routing-key: post.dead
      comment:
        name: comment.queue
        dlq: comment.dead.queue
        routing-key: comment.#
        dlq-routing-key: comment.dead
      notification:
        name: notification.queue
        dlq: notification.dead.queue
        routing-key: notification.#
        dlq-routing-key: notification.dead
    retry:
      max-attempts: 3
      initial-interval: 1000
      multiplier: 2.0
      max-interval: 10000

users:
  scheduler:
    clean-refresh-token:
      batch-size: 1000
      cron: ${CLEAN_REFRESH_TOKEN_CRON}